<!-- Backdrop -->
<div class="modal-overlay"></div>

<!-- Dialog -->
<div
  class="modal-dialog"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
  aria-describedby="modal-desc"
>
  <h2 id="modal-title" class="modal-title">{{ actionLabel() }} Task</h2>
  <p id="modal-desc" class="modal-message">
    @if (action() === 'remove') {
      Are you sure you want to remove "{{ toDoItem().name }}"?
    } @else {
      Mark "{{ toDoItem().name }}" as complete?
    }
  </p>

  <div class="modal-actions">
    <button class="modal-btn-cancel" (click)="cancel.emit()">Cancel</button>
    <button class="modal-btn-confirm" [class.danger]="action() === 'remove'" (click)="confirm()">
      {{ actionLabel() }}
    </button>
  </div>
</div>
